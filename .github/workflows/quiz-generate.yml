name: PR Balrog — Generate Quiz

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to regenerate quiz for (used by !balrog retry)'
        required: true
        type: number

# Needed to create check runs and post comments
permissions:
  checks: write
  pull-requests: write
  contents: read
  models: read

jobs:
  generate-quiz:
    name: Generate PR Quiz
    runs-on: ubuntu-latest
    # Skip draft PRs on pull_request events; always run on workflow_dispatch
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false

    steps:
      - name: Generate quiz
        uses: ./   # use local action (replace with: your-org/pr-balrog@v1 after publishing)
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # --- AI Provider ---
          # Option A: GitHub Models (free for Copilot orgs, no extra secret needed)
          ai-provider: github-models

          # Option B: Anthropic Claude (uncomment + add ANTHROPIC_API_KEY secret)
          # ai-provider: anthropic
          # api-key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Option C: OpenAI (uncomment + add OPENAI_API_KEY secret)
          # ai-provider: openai
          # api-key: ${{ secrets.OPENAI_API_KEY }}

          # --- Quiz settings ---
          pass-threshold: '80'
          max-attempts: '3'
          quiz-size: 'auto'
          min-lines-threshold: '10'
          language: 'auto'

          # Passed automatically by !balrog retry — leave empty for pull_request events
          pr-number-override: ${{ github.event.inputs.pr_number || '' }}
